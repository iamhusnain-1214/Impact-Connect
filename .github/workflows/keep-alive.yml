name: Keep DB Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit public-stats endpoint (touches the DB)
        run: |
          curl -f -sS https://impact-connect-six.vercel.app/api/public-stats \
            || echo "Ping failed, but not failing the job so history stays clean"